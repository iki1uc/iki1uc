<script>
function load(){
  // URL bleibt sichtbar, aber wird NICHT geladen
  out.textContent = "TOOLOMAT v1.1 bereit.\nBitte TEST drücken.";
}

function test(){
  let o = "";
  const src = u.value.trim();

  if (!src) {
    o = "Keine Eingabe.\nBitte HTML-Code oder JS-Code einfügen.";
    out.textContent = o;
    return;
  }

  // Parser
  const parser = new DOMParser();
  const doc = parser.parseFromString(src, "text/html");

  // Messungen
  const btn = doc.querySelectorAll("button").length;
  const scripts = doc.querySelectorAll("script").length;
  const onclicks = doc.querySelectorAll("[onclick]").length;

  // Engine-Scan (Textbasiert)
  const listeners = (src.match(/addEventListener/g) || []).length;
  const zero = (src.match(/zeroPoint/g) || []).length;
  const rotation = (src.match(/rotation/g) || []).length;
  const vaddr = (src.match(/virtualAddresses/g) || []).length;
  const push = (src.match(/data-push/g) || []).length;

  o += "=== TOOLOMAT v1.1 ===\n";
  o += "Buttons:          " + btn + "\n";
  o += "Scripts:          " + scripts + "\n";
  o += "Onclick-Attr:     " + onclicks + "\n";
  o += "EventListener:    " + listeners + "\n\n";

  o += "=== ENGINE ===\n";
  o += "zeroPoint:        " + zero + "\n";
  o += "rotation:         " + rotation + "\n";
  o += "virtualAddresses: " + vaddr + "\n";
  o += "data-push:        " + push + "\n";

  out.textContent = o;
}
</script>
