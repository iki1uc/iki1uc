<body>
<h1>TOOLOMAT UI – Button-Test</h1>

URL: <input id="u"><button onclick="load()">LADEN</button>
<iframe id="f"></iframe>

<button onclick="test()">TEST</button>

<pre id="out"></pre>

<script>
function load(){f.src=u.value.trim();}
function test(){
 let o="";
 try{
  const d=f.contentDocument;
  const btn=[...d.querySelectorAll("button")];
  o+=`Buttons: ${btn.length}\n`;
  btn.forEach((b,i)=>{
    const before=d.body.innerHTML.length;
    b.click();
    const after=d.body.innerHTML.length;
    o+=`[${i}] "${b.textContent.trim()}" → DOMΔ: ${after-before}\n`;
  });
 }catch(e){o="Kein Zugriff (CORS).";}
 out.textContent=o;
}
</script>
