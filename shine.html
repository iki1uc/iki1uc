<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SHIFT – Index</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0f;
      color: #ffffff;
      font-family: "Noto Sans JP", sans-serif;
      line-height: 1.6;
    }

    header {
      padding: 40px;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      letter-spacing: 0.1em;
    }

    .shine-line {
      font-size: 1.4rem;
      transition: all 1.2s ease;
      display: inline-block;
    }

    .phase1 {
      color: #ff3b3b;
    }

    .phase2 {
      color: #000000;
      background: #ffffff;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: 700;
      font-style: italic;
      transform: scale(1.12);
      font-family: "Yuji Syuku", serif;
    }

    main {
      padding: 20px 40px;
      max-width: 900px;
      margin: auto;
    }

    nav ul {
      list-style: none;
      padding: 0;
    }

    nav li {
      padding: 8px 0;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.3s;
    }

    nav li:hover {
      color: #ff3b3b;
      transform: translateX(6px);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.6;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <h1>SHIFT</h1>
    <p id="shine" class="shine-line">時間のずれで、君を救う。</p>
  </header>

  <main>
    <section>
      <h2>物語</h2>
      <p>
        彼女は、遠く離れた誰かの未来の災害を「先に」見てしまう。  
        それは、救えるかもしれないという、ささやかな希望だった。
      </p>
    </section>

    <section>
      <h2>メニュー</h2>
      <nav>
        <ul>
          <li>ホーム</li>
          <li>キャラクター</li>
          <li>時間システム</li>
          <li>エピソード</li>
        </ul>
      </nav>
    </section>
  </main>

  <footer>
    © SHIFT
  </footer>

  <script>
    const shine = document.getElementById("shine");

    setTimeout(() => shine.classList.add("phase1"), 800);

    setTimeout(() => {
      shine.classList.remove("phase1");
      shine.classList.add("phase2");
    }, 2000);
  </script>

</body>
</html>
