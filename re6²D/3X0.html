<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>3X0 UI‑Scan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .block {
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .content {
            font-size: 15px;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <!-- BLOCK 1: UI-KOPF -->
    <div class="block">
        <div class="title">UI‑Kopf</div>
        <div class="content">
            UI‑Seite: <span id="uiName">–</span><br>
            Status: sichtbar<br>
            Hinweis: Dieser Scan bewertet nichts, er zeigt nur die Oberfläche
        </div>
    </div>

    <!-- BLOCK 2: UI-BILD -->
    <div class="block">
        <div class="title">UI‑Bild</div>
        <div class="content">
            Sichtbare Struktur, Layout, Elemente und Bereiche werden hier beschrieben
        </div>
    </div>

    <!-- BLOCK 3: UI-NOTIZ -->
    <div class="block">
        <div class="title">UI‑Notiz</div>
        <div class="content">
            Kurze Beobachtung: Was fällt auf, was ist da, was fehlt, was wirkt klar
        </div>
    </div>

</body>
</html>
