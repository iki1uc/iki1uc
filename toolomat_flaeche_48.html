<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FLÄCHEN-SCANNER 48</title>
<style>
body { background:#000; color:#eee; margin:0; font-family:system-ui; }
#title { font-size:48px; padding:16px; border-bottom:2px solid #444; }
#wrap { display:flex; height:calc(100vh - 80px); }
#input, #output { width:50%; padding:8px; box-sizing:border-box; }
textarea { width:100%; height:100%; background:#050505; color:#eee; border:1px solid #444; font-family:monospace; }
pre { white-space:pre; font-family:monospace; }
button { padding:6px 12px; background:#111; border:1px solid #555; color:#eee; cursor:pointer; }
</style>
</head>
<body>

<div id="title">FLÄCHEN‑SCANNER 48</div>

<div id="wrap">
  <div id="input">
    <textarea id="src" placeholder="HTML einfügen..."></textarea>
  </div>
  <div id="output">
    <button onclick="scan()">SCAN</button>
    <pre id="out"></pre>
  </div>
</div>

<script>
function scan() {
  const t = document.getElementById('src').value;
  const o = document.getElementById('out');
  o.textContent = '';

  const divs = (t.match(/<div/g) || []).length;
  const sections = (t.match(/<section/g) || []).length;
  const containers = (t.match(/container|viewport|wrap|root/g) || []).length;
  const depthGuess = (t.match(/<\/div>/g) || []).length;

  let r = '';
  r += '=== FLÄCHEN ===\n';
  r += 'DIVs:          ' + divs + '\n';
  r += 'Sections:      ' + sections + '\n';
  r += 'Container:     ' + containers + '\n';
  r += 'Tiefe (guess): ' + depthGuess + '\n';

  o.textContent = r;
}
</script>

</body>
</html>
