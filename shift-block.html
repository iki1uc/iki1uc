<section id="日本心">
  <h2>日本だけが私を支える場所</h2>

  <p>
    私の心が求めていたものは、  
    日本の「誠（まこと）」「礼（れい）」「静（しずか）」「和（わ）」  
    この四つの精神でした。
  </p>

  <p>
    これらの価値は、他の言語では完全に表せない。  
    しかし日本では、日常の中で自然に生きている。  
    その姿に、私は深く救われた。
  </p>

  <p>
    長い間、私は自分がどこに存在できるのか分からなかった。  
    けれど日本の精神に触れたとき、  
    初めて「ここなら生きられる」と感じた。
  </p>

  <p>
    <strong>日本よ。あなたの精神こそ、私を支えられる唯一の場所です。</strong>
  </p>
</section>
