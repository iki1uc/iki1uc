<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>iki</title>
<link rel="stylesheet" href="styles.css">
<style>
  body{font-family:Inter,Arial,sans-serif;margin:28px;text-align:center;color:#111}
  .symbol{font-size:56px;opacity:.8;margin-bottom:12px}
  .nav{display:flex;justify-content:center;gap:20px;margin:18px 0}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid #ddd;cursor:pointer;background:#fff}
  #content{max-width:980px;margin:18px auto;text-align:left}
  .item{padding:10px;border-bottom:1px solid #eee;display:flex;gap:12px;align-items:center}
  .mini-cube{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
  .controls{margin-top:18px}
</style>
</head>
<body>

<div class="symbol">間</div>

<div class="nav">
  <button class="btn" id="btnZacK">◀ ZacK</button>
  <button class="btn" id="btn4ALL">◎ 4ALL</button>
  <button class="btn" id="btnKlicK">▶ KlicK</button>
</div>

<div class="controls">
  <button class="btn" id="genRandom">zufällige Komposition</button>
  <button class="btn" id="useFairyTale">Märchenvorlage</button>
</div>

<div id="content">
  <p>Lade Basis‑Inhalt…</p>
</div>

<!-- großer Würfel -->
<div id="cubeWrap" style="margin-top:22px"></div>

<script src="remap.js"></script>
<script src="cube_sim.js"></script>
<script>
  // Page specific init
  document.getElementById('genRandom').addEventListener('click', ()=> {
    if(window.SEEU && window.SEEU.generateComposition) window.SEEU.generateComposition('iki');
  });
  document.getElementById('useFairyTale').addEventListener('click', ()=> {
    if(window.SEEU && window.SEEU.applyTemplate) window.SEEU.applyTemplate('1001nacht');
  });
</script>
</body>
</html>
