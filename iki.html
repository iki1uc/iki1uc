<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>iki</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="symbol">間</div>
  <nav class="nav">
    <button class="btn" id="btnZacK">◀ ZacK</button>
    <button class="btn" id="btn4ALL">◎ 4ALL</button>
    <button class="btn" id="btnKlicK">▶ KlicK</button>
  </nav>
</header>

<div class="controls">
  <button class="btn" id="genRandom">zufällige Komposition</button>
  <button class="btn" id="useFairyTale">Märchenvorlage</button>
  <button class="btn" id="toggleDizzy">Dizzy‑Mode</button>
</div>

<main id="content">
  <p>Lade Basis‑Inhalt…</p>
</main>

<!-- großer Würfel -->
<div id="cubeWrap"><div id="cube" class="cube"></div></div>

<script src="remap.js"></script>
<script src="cube_sim.js"></script>
<script>
  // Page hooks
  document.getElementById('genRandom').addEventListener('click', ()=> SEEU.generateComposition('iki'));
  document.getElementById('useFairyTale').addEventListener('click', ()=> SEEU.applyTemplate?.('1001nacht') || SEEU.generateComposition('iki'));
  document.getElementById('toggleDizzy').addEventListener('click', ()=>{
    // Dizzy toggles: temporarily increase composition density and quake probability
    const prev = SEEU.getConfig();
    // quick visual: generate a heavy composition
    SEEU.generateComposition('iki');
    // nudge cube
    SEEU.applyImpulse?.((Math.random()-0.5)*0.14,(Math.random()-0.5)*0.12);
  });
</script>
</body>
</html>
